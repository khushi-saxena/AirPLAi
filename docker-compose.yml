services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: airplai
      POSTGRES_PASSWORD: airplai
      POSTGRES_DB: airplai
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airplai"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://airplai:airplai@db:5432/airplai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # seed once, then serve
    command: >
      sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000"
