services:
  - type: web
    name: airplai-game-day-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: airplai-db
          property: connectionString

databases:
  - name: airplai-db
    plan: free
