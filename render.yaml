# Live demo deploys as a single web service on SQLite (re-seeds on each boot).
# The production Postgres path is in docker-compose.yml and the architecture doc.
services:
  - type: web
    name: airplai-game-day-engine
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port $PORT